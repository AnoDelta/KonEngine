name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev libxinerama-dev libxcursor-dev
    - name: Build
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build
    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: build/libKonEngine.a

  release-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Build
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CONFIGURATION_TYPES=Release && cmake --build build --config Release
    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: build/Release/KonEngine.lib
