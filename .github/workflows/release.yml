name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
          libwayland-dev wayland-protocols libxkbcommon-dev libxinerama-dev libxcursor-dev

    - name: Build
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build

    - name: Install into staging
      run: cmake --install build --prefix staging

    - name: Package
      run: |
        cd staging
        zip -r ../KonEngine-linux-${{ github.ref_name }}.zip .

    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: KonEngine-linux-${{ github.ref_name }}.zip

  release-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CONFIGURATION_TYPES=Release && cmake --build build --config Release

    - name: Install into staging
      run: cmake --install build --prefix staging

    - name: Package
      run: Compress-Archive -Path staging\* -DestinationPath KonEngine-windows-${{ github.ref_name }}.zip

    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: KonEngine-windows-${{ github.ref_name }}.zip
