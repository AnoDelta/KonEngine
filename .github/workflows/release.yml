name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # -----------------------------------------------------------------------
  # Linux -- engine library + headers
  # -----------------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install engine dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libxinerama-dev libxcursor-dev

      - name: Build engine
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build

      - name: Install into staging
        run: cmake --install build --prefix staging

      - name: Copy headers into staging
        run: |
          mkdir -p staging/include/KonEngine
          cp src/KonEngine.hpp staging/include/
          for dir in window renderer time camera collision input font audio animation node; do
            if [ -d "src/$dir" ]; then
              mkdir -p "staging/include/KonEngine/$dir"
              find "src/$dir" -name "*.hpp" -exec cp {} "staging/include/KonEngine/$dir/" \;
            fi
          done
          find src -maxdepth 1 -name "*.hpp" -exec cp {} staging/include/KonEngine/ \;

      - name: Package engine
        run: cd staging && zip -r ../KonEngine-linux-${{ github.ref_name }}.zip .

      - name: Upload engine release
        uses: softprops/action-gh-release@v1
        with:
          files: KonEngine-linux-${{ github.ref_name }}.zip

  # -----------------------------------------------------------------------
  # Linux -- KonAnimator + anim_compiler
  # -----------------------------------------------------------------------
  release-linux-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install engine + Qt5 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libxinerama-dev libxcursor-dev \
            qtbase5-dev libqt5opengl5-dev

      - name: Build tools
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DKON_BUILD_TOOLS=ON
          cmake --build build --target KonAnimator
          cmake --build build --target anim_compiler

      - name: Find tool binaries
        run: find build -type f -name "KonAnimator" -o -name "anim_compiler" | sort

      - name: Package tools
        run: |
          mkdir -p tools-staging
          find build -name "KonAnimator" -type f -exec cp {} tools-staging/ \;
          find build -name "anim_compiler" -type f -exec cp {} tools-staging/ \;
          zip -r KonAnimator-linux-${{ github.ref_name }}.zip tools-staging/

      - name: Upload tools release
        uses: softprops/action-gh-release@v1
        with:
          files: KonAnimator-linux-${{ github.ref_name }}.zip

  # -----------------------------------------------------------------------
  # Linux -- KonPaktor + konpak
  # -----------------------------------------------------------------------
  release-linux-konpaktor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install KonPaktor dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev qtmultimedia5-dev \
            libssl-dev zlib1g-dev

      - name: Build KonPaktor
        run: |
          cd tools/KonPaktor
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target KonPaktor
          cmake --build build --target konpak

      - name: Find KonPaktor binaries
        run: find tools/KonPaktor/build -type f -name "KonPaktor" -o -name "konpak" | sort

      - name: Package KonPaktor
        run: |
          mkdir -p konpaktor-staging
          find tools/KonPaktor/build -name "KonPaktor" -type f -exec cp {} konpaktor-staging/ \;
          find tools/KonPaktor/build -name "konpak" -type f -exec cp {} konpaktor-staging/ \;
          zip -r KonPaktor-linux-${{ github.ref_name }}.zip konpaktor-staging/

      - name: Upload KonPaktor release
        uses: softprops/action-gh-release@v1
        with:
          files: KonPaktor-linux-${{ github.ref_name }}.zip

  # -----------------------------------------------------------------------
  # Windows -- engine library + headers
  # -----------------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build engine
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CONFIGURATION_TYPES=Release
          cmake --build build --config Release

      - name: Install into staging
        run: cmake --install build --prefix staging

      - name: Copy headers into staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/include/KonEngine | Out-Null
          Copy-Item src/KonEngine.hpp staging/include/

          $dirs = @("window","renderer","time","camera","collision","input","font","audio","animation","node")
          foreach ($dir in $dirs) {
            if (Test-Path "src/$dir") {
              New-Item -ItemType Directory -Force -Path "staging/include/KonEngine/$dir" | Out-Null
              Get-ChildItem "src/$dir" -Filter "*.hpp" | Copy-Item -Destination "staging/include/KonEngine/$dir/"
            }
          }
          Get-ChildItem src -Filter "*.hpp" | Copy-Item -Destination staging/include/KonEngine/

      - name: Package engine
        run: Compress-Archive -Path staging\* -DestinationPath KonEngine-windows-${{ github.ref_name }}.zip

      - name: Upload engine release
        uses: softprops/action-gh-release@v1
        with:
          files: KonEngine-windows-${{ github.ref_name }}.zip

  # -----------------------------------------------------------------------
  # Windows -- KonAnimator + anim_compiler
  # -----------------------------------------------------------------------
  release-windows-tools:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt5
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: win64_msvc2019_64
          cache: true

      - name: Build tools
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DKON_BUILD_TOOLS=ON
          cmake --build build --config Release --target KonAnimator
          cmake --build build --config Release --target anim_compiler

      - name: Find tool binaries
        shell: pwsh
        run: Get-ChildItem -Recurse build -Include "KonAnimator.exe","anim_compiler.exe" | Select-Object FullName

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          mkdir tools-staging
          $ka = Get-ChildItem -Recurse build -Filter "KonAnimator.exe" | Select-Object -First 1
          $ac = Get-ChildItem -Recurse build -Filter "anim_compiler.exe" | Select-Object -First 1
          Copy-Item $ka.FullName tools-staging          Copy-Item $ac.FullName tools-staging          $qtBin = (Get-ChildItem "$env:RUNNER_WORKSPACE\Qt" -Recurse -Filter "windeployqt.exe" | Select-Object -First 1).DirectoryName
          & "$qtBin\windeployqt.exe" --release tools-staging\KonAnimator.exe
          & "$qtBin\windeployqt.exe" --release tools-stagingnim_compiler.exe

      - name: Package tools
        run: Compress-Archive -Path tools-staging\* -DestinationPath KonAnimator-windows-${{ github.ref_name }}.zip

      - name: Upload tools release
        uses: softprops/action-gh-release@v1
        with:
          files: KonAnimator-windows-${{ github.ref_name }}.zip

  # -----------------------------------------------------------------------
  # Windows -- KonPaktor + konpak
  # -----------------------------------------------------------------------
  release-windows-konpaktor:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt5
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: win64_msvc2019_64
          cache: true

      - name: Install OpenSSL + zlib via vcpkg
        run: |
          vcpkg install openssl:x64-windows zlib:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Build KonPaktor
        run: |
          cd tools/KonPaktor
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release --target KonPaktor
          cmake --build build --config Release --target konpak

      - name: Find KonPaktor binaries
        shell: pwsh
        run: Get-ChildItem -Recurse tools\KonPaktoruild -Include "KonPaktor.exe","konpak.exe" | Select-Object FullName

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          mkdir konpaktor-staging
          $kp = Get-ChildItem -Recurse tools\KonPaktoruild -Filter "KonPaktor.exe" | Select-Object -First 1
          $kc = Get-ChildItem -Recurse tools\KonPaktoruild -Filter "konpak.exe" | Select-Object -First 1
          Copy-Item $kp.FullName konpaktor-staging          Copy-Item $kc.FullName konpaktor-staging          $qtBin = (Get-ChildItem "$env:RUNNER_WORKSPACE\Qt" -Recurse -Filter "windeployqt.exe" | Select-Object -First 1).DirectoryName
          & "$qtBin\windeployqt.exe" --release konpaktor-staging\KonPaktor.exe

      - name: Package KonPaktor
        run: Compress-Archive -Path konpaktor-staging\* -DestinationPath KonPaktor-windows-${{ github.ref_name }}.zip

      - name: Upload KonPaktor release
        uses: softprops/action-gh-release@v1
        with:
          files: KonPaktor-windows-${{ github.ref_name }}.zip
